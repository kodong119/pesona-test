<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>나는 칭찬 받으면 어떻게 무너지는 타입?</title>
  <meta property="og:title" content="나는 칭찬 받으면 어떻게 무너지는 타입?" />
  <meta property="og:description" content="칭찬 한 마디에 무너지는 당신의 패턴 💬" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --theme: #f0f0f0;
      --theme-dim: rgba(240,240,240,0.12);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Noto Sans KR', sans-serif;
      background: #111;
      color: #f0f0f0;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wrap {
      width: 100%;
      max-width: 480px;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: 0 16px;
    }

    .screen { display: none; flex-direction: column; flex: 1; padding: 40px 0 32px; }
    .screen.active { display: flex; }

    /* intro */
    .badge {
      display: inline-block;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .08em;
      padding: 5px 14px;
      color: #aaa;
      text-transform: uppercase;
      margin-bottom: 28px;
      align-self: flex-start;
    }
    .intro-emoji { font-size: 72px; margin-bottom: 24px; line-height: 1; }
    .intro-title { font-size: 26px; font-weight: 800; line-height: 1.35; margin-bottom: 14px; }
    .intro-sub   { font-size: 15px; color: #888; line-height: 1.6; margin-bottom: 40px; }

    .btn-start {
      background: #f0f0f0;
      color: #111;
      border: none;
      border-radius: 16px;
      padding: 18px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      transition: opacity .15s;
    }
    .btn-start:hover { opacity: .85; }
    .intro-count { text-align: center; color: #555; font-size: 13px; margin-top: 16px; }

    /* quiz */
    .progress-bar {
      height: 3px;
      background: rgba(255,255,255,0.1);
      border-radius: 99px;
      margin-bottom: 32px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--theme);
      border-radius: 99px;
      transition: width .35s ease;
    }
    .q-count { font-size: 12px; color: #555; margin-bottom: 10px; font-weight: 600; letter-spacing: .06em; }
    .q-emoji { font-size: 40px; margin-bottom: 16px; }
    .q-text  { font-size: 20px; font-weight: 700; line-height: 1.45; margin-bottom: 28px; }
    .options { display: flex; flex-direction: column; gap: 10px; }
    .option-btn {
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 16px 18px;
      font-size: 15px;
      color: #e8e8e8;
      cursor: pointer;
      text-align: left;
      line-height: 1.5;
      transition: background .15s, border-color .15s, transform .1s;
    }
    .option-btn:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.3);
      transform: translateY(-1px);
    }
    .option-btn.selected {
      background: var(--theme-dim);
      border-color: var(--theme);
    }

    /* result */
    #result { padding-top: 0; }
    .result-header {
      padding: 48px 24px 32px;
      margin: 0 -16px;
      text-align: center;
      border-radius: 0 0 32px 32px;
      margin-bottom: 28px;
    }
    .result-badge {
      display: inline-block;
      background: rgba(0,0,0,0.2);
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .1em;
      padding: 5px 14px;
      color: rgba(0,0,0,0.6);
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .result-emoji { font-size: 72px; margin-bottom: 16px; }
    .result-name  { font-size: 26px; font-weight: 800; color: #111; margin-bottom: 6px; }
    .result-sub   { font-size: 13px; font-weight: 600; color: rgba(0,0,0,0.45); letter-spacing: .08em; text-transform: uppercase; }
    .result-desc  { font-size: 15px; line-height: 1.75; color: #ccc; margin-bottom: 28px; word-break: keep-all; }

    .traits-title { font-size: 13px; font-weight: 700; color: #555; letter-spacing: .06em; text-transform: uppercase; margin-bottom: 14px; }
    .trait { margin-bottom: 14px; }
    .trait-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .trait-name { font-size: 14px; font-weight: 600; }
    .trait-pct  { font-size: 13px; color: #888; }
    .trait-bar  { height: 6px; background: rgba(255,255,255,0.08); border-radius: 99px; overflow: hidden; }
    .trait-fill { height: 100%; border-radius: 99px; width: 0; transition: width 1s ease; }

    .compat {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 28px 0;
    }
    .compat-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 16px;
    }
    .compat-label { font-size: 11px; font-weight: 700; letter-spacing: .06em; color: #555; text-transform: uppercase; margin-bottom: 6px; }
    .compat-name  { font-size: 14px; font-weight: 700; }

    .btn-share {
      background: #f0f0f0;
      color: #111;
      border: none;
      border-radius: 14px;
      padding: 16px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      margin-bottom: 10px;
      transition: opacity .15s;
    }
    .btn-share:hover { opacity: .85; }
    .btn-retry {
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      padding: 16px;
      font-size: 15px;
      font-weight: 600;
      color: #ccc;
      cursor: pointer;
      width: 100%;
      transition: background .15s;
    }
    .btn-retry:hover { background: rgba(255,255,255,0.14); }

    /* analyzing */
    #analyzing {
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 0;
    }
    .analyzing-emoji { font-size: 56px; margin-bottom: 32px; animation: pulse 1.2s ease-in-out infinite; }
    @keyframes pulse {
      0%, 100% { transform: scale(1);   opacity: 1; }
      50%       { transform: scale(1.1); opacity: .7; }
    }
    .analyzing-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .analyzing-sub   { font-size: 14px; color: #666; margin-bottom: 40px; }
    .analyzing-bar {
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 99px;
      overflow: hidden;
    }
    .analyzing-fill {
      height: 100%;
      background: var(--theme);
      border-radius: 99px;
      width: 0%;
      transition: width 2.4s cubic-bezier(.4,0,.2,1);
    }

    @media (max-width: 400px) {
      .intro-title { font-size: 22px; }
      .q-text { font-size: 18px; }
    }
  </style>
</head>
<body>
<div class="wrap">

  <div id="intro" class="screen active">

    <h1 class="intro-title" id="intro-title"></h1>

    <button class="btn-start" onclick="startQuiz()">테스트 시작하기 →</button>

  </div>

  <div id="quiz" class="screen">

    <div class="q-count" id="q-count"></div>
    <div class="q-emoji" id="q-emoji"></div>
    <div class="q-text"  id="q-text"></div>
    <div class="options" id="options"></div>
  </div>

  <div id="analyzing" class="screen">
    <div class="analyzing-emoji" id="analyzing-emoji">🤖</div>
    <div class="analyzing-title">AI가 분석 중이에요</div>
    <div class="analyzing-sub">당신의 답변을 해석하고 있어요...</div>
    <div class="analyzing-bar"><div class="analyzing-fill" id="analyzing-fill"></div></div>
  </div>

  <div id="result" class="screen">
    <div class="result-header" id="result-header">
      <div class="result-badge" id="result-badge"></div>
      <div class="result-emoji" id="result-emoji"></div>
      <div class="result-name"  id="result-name"></div>
      <div class="result-sub"   id="result-sub"></div>
    </div>
    <p class="result-desc" id="result-desc"></p>
    <div class="traits-title">나의 지표</div>
    <div id="traits"></div>
    <div class="compat" id="compat"></div>
    <button class="btn-share" onclick="share()">결과 공유하기 🔗</button>
    <button class="btn-retry" onclick="retry()">다시 테스트하기</button>
  </div>

</div>

<script>
var DATA = JSON.parse(document.getElementById('quiz-data').textContent);
var currentQ = 0;
var scores = {};

function show(id) {
  document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
}

function init() {
  var m = DATA.meta;
  document.getElementById('intro-badge').textContent = m.badge;
  document.getElementById('intro-emoji').textContent = m.emoji;
  document.getElementById('intro-title').textContent = m.title;
  document.getElementById('intro-sub').textContent   = m.subtitle;
  document.getElementById('intro-count').textContent = '총 ' + m.questionCount + '문항 · 결과 ' + m.resultCount + '가지';
  document.getElementById('analyzing-emoji').textContent = m.emoji;
  applyTheme();
}

function applyTheme() {
  // 결과들의 색상 중 첫 번째를 테마 색상으로 사용
  var keys = Object.keys(DATA.results);
  var color = DATA.results[keys[0]].color;

  // hex → rgb 변환
  var r = parseInt(color.slice(1, 3), 16);
  var g = parseInt(color.slice(3, 5), 16);
  var b = parseInt(color.slice(5, 7), 16);

  document.documentElement.style.setProperty('--theme', color);
  document.documentElement.style.setProperty('--theme-dim', 'rgba(' + r + ',' + g + ',' + b + ',0.15)');

  // 인트로 배경에 주제 색상 은은하게 반영
  document.getElementById('intro').style.background =
    'radial-gradient(ellipse at 50% -10%, rgba(' + r + ',' + g + ',' + b + ',0.25) 0%, transparent 65%)';
}

function startQuiz() {
  currentQ = 0;
  scores = {};
  DATA.scoreKeys.forEach(function(k) { scores[k] = 0; });
  show('quiz');
  renderQuestion();
}

function renderQuestion() {
  var q   = DATA.questions[currentQ];
  var tot = DATA.questions.length;

  document.getElementById('progress').style.width = ((currentQ / tot) * 100) + '%';
  document.getElementById('q-count').textContent  = 'Q' + (currentQ + 1) + ' / ' + tot;
  document.getElementById('q-emoji').textContent  = q.emoji;
  document.getElementById('q-text').textContent   = q.text;

  var box = document.getElementById('options');
  box.innerHTML = '';
  q.options.forEach(function(opt) {
    var btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = opt.text;
    btn.onclick = (function(s, b) { return function() { pick(s, b); }; })(opt.scores, btn);
    box.appendChild(btn);
  });
}

function pick(scoreMap, btn) {
  document.querySelectorAll('.option-btn').forEach(function(b) { b.classList.remove('selected'); });
  btn.classList.add('selected');
  setTimeout(function() {
    Object.keys(scoreMap).forEach(function(k) { scores[k] = (scores[k] || 0) + scoreMap[k]; });
    currentQ++;
    if (currentQ < DATA.questions.length) {
      renderQuestion();
    } else {
      showAnalyzing();
    }
  }, 280);
}

function showAnalyzing() {
  show('analyzing');
  requestAnimationFrame(function() {
    document.getElementById('analyzing-fill').style.width = '100%';
  });
  setTimeout(showResult, 2500);
}

function showResult() {
  var sorted = Object.keys(scores).map(function(k) { return [k, scores[k]]; });
  sorted.sort(function(a, b) { return b[1] - a[1]; });
  var top2key = [sorted[0][0], sorted[1][0]].sort().join(',');
  var key = DATA.combos[top2key] || Object.keys(DATA.results)[0];
  var res = DATA.results[key];
  var m   = DATA.meta;

  document.getElementById('result-header').style.background = res.color;
  document.getElementById('result-badge').textContent = m.resultBadge;
  document.getElementById('result-emoji').textContent = res.emoji;
  document.getElementById('result-name').textContent  = res.name;
  document.getElementById('result-sub').textContent   = res.sub;
  document.getElementById('result-desc').textContent  = res.desc;

  var traitsEl = document.getElementById('traits');
  traitsEl.innerHTML = '';
  res.traits.forEach(function(t) {
    var div = document.createElement('div');
    div.className = 'trait';
    div.innerHTML =
      '<div class="trait-top">' +
        '<span class="trait-name">' + t.icon + ' ' + t.name + '</span>' +
        '<span class="trait-pct">' + t.pct + '%</span>' +
      '</div>' +
      '<div class="trait-bar">' +
        '<div class="trait-fill" style="background:' + res.color + '" data-pct="' + t.pct + '"></div>' +
      '</div>';
    traitsEl.appendChild(div);
  });

  var compatEl = document.getElementById('compat');
  compatEl.innerHTML =
    '<div class="compat-card">' +
      '<div class="compat-label">잘 맞는 유형</div>' +
      '<div class="compat-name">' + res.good + '</div>' +
    '</div>' +
    '<div class="compat-card">' +
      '<div class="compat-label">안 맞는 유형</div>' +
      '<div class="compat-name">' + res.bad + '</div>' +
    '</div>';

  show('result');

  requestAnimationFrame(function() {
    document.querySelectorAll('.trait-fill').forEach(function(el) {
      el.style.width = el.getAttribute('data-pct') + '%';
    });
  });
}

function share() {
  var shareUrl = DATA.meta.shareUrl;
  if (navigator.share) {
    navigator.share({ title: DATA.meta.title, url: shareUrl });
  } else {
    navigator.clipboard.writeText(shareUrl).then(function() { alert('링크가 복사됐어요!'); });
  }
}

function retry() { startQuiz(); }

init();
</script>
