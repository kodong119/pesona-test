<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>옷장 정리 스타일로 알아보는 나의 숨겨진 성격</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --card: #13131a;
  --card-hover: #1a1a25;
  --accent1: #7c5cfc;
  --accent2: #ff6b9d;
  --accent3: #00d4aa;
  --accent4: #ffd166;
  --text: #e8e6f0;
  --text-dim: #8a879a;
  --glass: rgba(124, 92, 252, 0.08);
  --border: rgba(124, 92, 252, 0.15);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

.bg-orbs {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
}
.orb {
  position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.3;
  animation: orbFloat 8s ease-in-out infinite;
}
.orb-1 { width: 400px; height: 400px; background: var(--accent1); top: -100px; left: -100px; }
.orb-2 { width: 350px; height: 350px; background: var(--accent2); bottom: -80px; right: -80px; animation-delay: -3s; }
.orb-3 { width: 300px; height: 300px; background: var(--accent3); top: 50%; left: 50%; transform: translate(-50%,-50%); animation-delay: -5s; opacity: 0.15; }

@keyframes orbFloat {
  0%,100% { transform: translate(0,0) scale(1); }
  33% { transform: translate(30px,-20px) scale(1.05); }
  66% { transform: translate(-20px,30px) scale(0.95); }
}

.container {
  position: relative; z-index: 1;
  max-width: 520px; margin: 0 auto; padding: 20px;
  min-height: 100vh; display: flex; flex-direction: column; justify-content: center;
}

.screen { display: none; animation: fadeUp 0.6s ease; }
.screen.active { display: flex; flex-direction: column; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

.intro-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--glass); border: 1px solid var(--border);
  padding: 6px 14px; border-radius: 100px; font-size: 12px;
  color: var(--accent1); width: fit-content; margin-bottom: 24px;
  font-family: 'Outfit', sans-serif; letter-spacing: 0.5px;
}
.intro-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent3); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

.intro-title {
  font-family: 'Outfit', sans-serif;
  font-size: 42px; font-weight: 800; line-height: 1.15;
  margin-bottom: 16px;
  background: linear-gradient(135deg, #fff 0%, var(--accent1) 50%, var(--accent2) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}

.intro-desc {
  font-size: 15px; color: var(--text-dim); line-height: 1.7;
  margin-bottom: 32px;
}

.intro-stats {
  display: flex; gap: 12px; margin-bottom: 36px;
}
.stat {
  flex: 1; background: var(--glass); border: 1px solid var(--border);
  border-radius: 16px; padding: 16px; text-align: center;
}
.stat-num {
  font-family: 'Outfit', sans-serif; font-size: 22px; font-weight: 700;
  background: linear-gradient(135deg, var(--accent1), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.stat-label { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

.btn-start {
  width: 100%; padding: 18px; border: none; border-radius: 16px;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 17px; font-weight: 700; cursor: pointer;
  background: linear-gradient(135deg, var(--accent1), var(--accent2));
  color: #fff; position: relative; overflow: hidden;
  transition: transform 0.2s, box-shadow 0.3s;
}
.btn-start:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(124,92,252,0.4);
}
.btn-start::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.15) 50%, transparent 60%);
  transform: translateX(-100%); animation: shimmer 3s infinite;
}
@keyframes shimmer { 100% { transform: translateX(100%); } }

.progress-wrap { margin-bottom: 32px; }
.progress-info {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 10px;
}
.progress-label {
  font-family: 'Outfit', sans-serif; font-size: 13px; color: var(--text-dim);
}
.progress-num {
  font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 700;
  color: var(--accent1);
}
.progress-bar {
  width: 100%; height: 6px; background: rgba(124,92,252,0.12);
  border-radius: 100px; overflow: hidden;
}
.progress-fill {
  height: 100%; border-radius: 100px;
  background: linear-gradient(90deg, var(--accent1), var(--accent2));
  transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
}

.q-emoji {
  font-size: 48px; margin-bottom: 16px;
  animation: bounceIn 0.5s ease;
}
@keyframes bounceIn {
  0% { transform: scale(0); } 60% { transform: scale(1.2); } 100% { transform: scale(1); }
}

.q-text {
  font-size: 20px; font-weight: 700; line-height: 1.5;
  margin-bottom: 28px;
}

.options { display: flex; flex-direction: column; gap: 12px; }

.opt-btn {
  width: 100%; padding: 16px 20px; border: 1px solid var(--border);
  border-radius: 14px; background: var(--card);
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 15px; color: var(--text); cursor: pointer;
  text-align: left; transition: all 0.25s; position: relative;
  overflow: hidden;
}
.opt-btn::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, var(--accent1), var(--accent2));
  opacity: 0; transition: opacity 0.3s;
}
.opt-btn span { position: relative; z-index: 1; }

@media (hover: hover) {
  .opt-btn:hover {
    border-color: var(--accent1);
    transform: translateX(6px);
    box-shadow: 0 4px 20px rgba(124,92,252,0.15);
  }
  .opt-btn:hover::before { opacity: 0.12; }
}
.opt-btn:active {
  border-color: var(--accent1);
  transform: translateX(6px) scale(0.98);
  box-shadow: 0 4px 20px rgba(124,92,252,0.15);
}
.opt-btn:active::before { opacity: 0.12; }

.loading-screen {
  align-items: center; justify-content: center; text-align: center;
  min-height: 60vh;
}
.loader-ring {
  width: 80px; height: 80px; border-radius: 50%;
  border: 3px solid var(--border);
  border-top-color: var(--accent1); border-right-color: var(--accent2);
  animation: spin 1s linear infinite;
  margin-bottom: 28px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 16px; font-weight: 500; margin-bottom: 8px; }
.loading-sub {
  font-size: 13px; color: var(--text-dim);
  animation: pulse 2s infinite;
}

.result-screen { align-items: center; }

.result-card {
  width: 100%; border-radius: 24px; overflow: hidden;
  background: var(--card); border: 1px solid var(--border);
  margin-bottom: 20px;
}
.result-hero {
  padding: 40px 32px 24px; text-align: center;
  position: relative; overflow: hidden;
}
.result-hero::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, var(--accent1), var(--accent2));
  opacity: 0.08;
}
.result-type-badge {
  display: inline-block; padding: 4px 14px; border-radius: 100px;
  font-family: 'Outfit', sans-serif; font-size: 11px; font-weight: 600;
  letter-spacing: 1.5px; text-transform: uppercase;
  background: rgba(255,255,255,0.1); color: var(--accent4);
  margin-bottom: 12px; position: relative;
}
.result-emoji { font-size: 64px; margin-bottom: 12px; position: relative; }
.result-name {
  font-family: 'Outfit', sans-serif; font-size: 28px; font-weight: 800;
  position: relative;
  background: linear-gradient(135deg, #fff, var(--accent1));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.result-subtitle {
  font-size: 14px; color: var(--text-dim); margin-top: 8px;
  position: relative;
}

.result-body { padding: 24px 28px 28px; }

.result-desc {
  font-size: 14px; line-height: 1.8; color: var(--text-dim);
  margin-bottom: 24px; word-break: keep-all;
}

.trait-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  margin-bottom: 24px;
}
.trait {
  background: var(--glass); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px; text-align: center;
}
.trait-icon { font-size: 22px; margin-bottom: 6px; }
.trait-name { font-size: 12px; font-weight: 600; color: var(--text); }
.trait-bar {
  margin-top: 8px; height: 4px; background: rgba(255,255,255,0.06);
  border-radius: 100px; overflow: hidden;
}
.trait-fill {
  height: 100%; border-radius: 100px;
  background: linear-gradient(90deg, var(--accent1), var(--accent3));
  transition: width 1.5s cubic-bezier(0.4,0,0.2,1);
  width: 0;
}

.compat-section { margin-bottom: 20px; }
.compat-title {
  font-size: 12px; font-weight: 600; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px;
}
.compat-row { display: flex; gap: 8px; }
.compat-tag {
  padding: 6px 14px; border-radius: 100px; font-size: 12px;
  background: var(--glass); border: 1px solid var(--border);
}
.compat-tag.good { border-color: rgba(0,212,170,0.3); color: var(--accent3); }
.compat-tag.bad { border-color: rgba(255,107,157,0.2); color: var(--accent2); }

.btn-retry {
  width: 100%; padding: 16px; border: 1px solid var(--border);
  border-radius: 14px; background: var(--card);
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 15px; font-weight: 600; color: var(--text); cursor: pointer;
  transition: all 0.25s;
}
.btn-retry:hover {
  border-color: var(--accent1);
  background: var(--card-hover);
}

.btn-share {
  width: 100%; padding: 16px; border: none; border-radius: 14px;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 15px; font-weight: 700; cursor: pointer;
  background: linear-gradient(135deg, var(--accent1), var(--accent2));
  color: #fff; margin-bottom: 10px;
  transition: transform 0.2s, box-shadow 0.3s;
}
.btn-share:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(124,92,252,0.4);
}

.footer {
  text-align: center; margin-top: 20px;
  font-size: 11px; color: var(--text-dim);
  opacity: 0.5;
}
</style>
</head>

":"충동력","pct":25}]},"sentimental_creative":{"bad":"실용 미니멀리스트","color":"#ffb347","desc":"옷마다 스토리가 있는 당신의 옷장은 살아있는 일기장이에요. 첫 데이트 때 입은 옷, 졸업식 날 셔츠... 버리라고요? 그건 추억을 버리는 거잖아요. 감수성이 풍부하고 관계를 소중히 여기는 따뜻한 사람이에요.","emoji":"🧸","good":"완벽주의 정리왕","name":"추억 보관 감성러","sub":"The Sentimental Keeper","traits":[{"icon":"💛","name":"감수성","pct":95},{"icon":"🎨","name":"창의력","pct":82},{"icon":"🤝","name":"정","pct":90},{"icon":"🗑️","name":"결단력","pct":25}]}};
const combos = {"creative,impulsive":"impulsive_trendy","creative,minimal":"minimal_practical","creative,neat":"creative_trendy","creative,practical":"practical_neat","creative,sentimental":"sentimental_creative","creative,trendy":"creative_trendy","impulsive,creative":"creative_trendy","impulsive,minimal":"impulsive_trendy","impulsive,neat":"impulsive_trendy","impulsive,practical":"impulsive_trendy","impulsive,sentimental":"sentimental_creative","impulsive,trendy":"impulsive_trendy","minimal,creative":"minimal_practical","minimal,impulsive":"minimal_practical","minimal,neat":"neat_minimal","minimal,practical":"minimal_practical","minimal,sentimental":"minimal_practical","minimal,trendy":"neat_minimal","neat,creative":"practical_neat","neat,impulsive":"neat_minimal","neat,minimal":"neat_minimal","neat,practical":"practical_neat","neat,sentimental":"practical_neat","neat,trendy":"neat_minimal","practical,creative":"creative_trendy","practical,impulsive":"practical_neat","practical,minimal":"minimal_practical","practical,neat":"practical_neat","practical,sentimental":"sentimental_creative","practical,trendy":"practical_neat","sentimental,creative":"sentimental_creative","sentimental,impulsive":"sentimental_creative","sentimental,minimal":"minimal_practical","sentimental,neat":"sentimental_creative","sentimental,practical":"practical_neat","sentimental,trendy":"creative_trendy","trendy,creative":"creative_trendy","trendy,impulsive":"impulsive_trendy","trendy,minimal":"minimal_practical","trendy,neat":"impulsive_trendy","trendy,practical":"practical_neat","trendy,sentimental":"sentimental_creative"};
const scoreKeys = ["neat","creative","sentimental","impulsive","minimal","practical","trendy"];

// ===== 상태 =====
let current = 0;
let scores = {};
scoreKeys.forEach(k => scores[k] = 0);

// ===== 화면 전환 =====
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById(id);
  el.classList.add('active');
  el.style.animation = 'none';
  el.offsetHeight;
  el.style.animation = '';
}

function startTest() {
  current = 0;
  scores = {};
  scoreKeys.forEach(k => scores[k] = 0);
  showQuestion();
}

function showQuestion() {
  show('question');
  const q = questions[current];
  document.getElementById('qEmoji').textContent = q.emoji;
  document.getElementById('qText').textContent = q.text;
  document.getElementById('progNum').textContent = `${current + 1} / ${questions.length}`;
  document.getElementById('progFill').style.width = `${(current / questions.length) * 100}%`;

  const opts = document.getElementById('opts');
  opts.innerHTML = '';
  q.options.forEach((o, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.innerHTML = `<span>${o.text}</span>`;
    btn.style.animationDelay = `${i * 0.08}s`;
    btn.onclick = () => selectOption(o.scores);
    opts.appendChild(btn);
  });
}

function selectOption(s) {
  Object.entries(s).forEach(([k, v]) => { scores[k] = (scores[k] || 0) + v; });
  current++;
  if (current < questions.length) {
    showQuestion();
  } else {
    document.getElementById('progFill').style.width = '100%';
    setTimeout(() => {
      show('loading');
      setTimeout(showResult, 2200);
    }, 300);
  }
}

function getResultType() {
  const dims = scoreKeys.map(k => ({ key: k, val: scores[k] || 0 }))
    .sort((a, b) => b.val - a.val);
  const top2 = [dims[0].key, dims[1].key];
  const fallback = Object.keys(results)[0];
  return results[combos[top2.join(',')] || fallback];
}

function showResult() {
  const r = getResultType();
  const el = document.getElementById('result');
  el.innerHTML = `
    <div class="result-card">
      <div class="result-hero">
        <div class="result-type-badge">${TEST_META.resultBadge}</div>
        <div class="result-emoji">${r.emoji}</div>
        <div class="result-name">${r.name}</div>
        <div class="result-subtitle">${r.sub}</div>
      </div>
      <div class="result-body">
        <p class="result-desc">${r.desc}</p>
        <div class="trait-grid">
          ${r.traits.map(t => `
            <div class="trait">
              <div class="trait-icon">${t.icon}</div>
              <div class="trait-name">${t.name}</div>
              <div class="trait-bar"><div class="trait-fill" data-pct="${t.pct}"></div></div>
            </div>
          `).join('')}
        </div>
        <div class="compat-section">
          <div class="compat-title">궁합</div>
          <div class="compat-row">
            <span class="compat-tag good">💚 ${r.good}</span>
            <span class="compat-tag bad">💔 ${r.bad}</span>
          </div>
        </div>
      </div>
    </div>
    <button class="btn-share" onclick="shareResult()">결과 공유하기 📤</button>
    <button class="btn-retry" onclick="startTest()">다시 테스트하기 🔄</button>
    <div class="footer">${TEST_META.title} · 2026</div>
  `;
  show('result');
  setTimeout(() => {
    document.querySelectorAll('.trait-fill').forEach(f => {
      f.style.width = f.dataset.pct + '%';
    });
  }, 300);
}

function shareResult() {
  const r = getResultType();
  const text = `나의 결과는 "${r.name}" ${r.emoji}\n${r.sub}\n\n나도 테스트 해보기 👉 ${window.location.href}`;
  if (navigator.share) {
    navigator.share({ title: TEST_META.title, text });
  } else {
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelector('.btn-share');
      btn.textContent = '복사 완료! ✅';
      setTimeout(() => btn.textContent = '결과 공유하기 📤', 2000);
    });
  }
}
</script>
